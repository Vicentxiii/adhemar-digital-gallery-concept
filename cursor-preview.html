<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Prévia — Cursor Fluido</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0b0d12;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(124,200,255,0.06), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(124,200,255,0.05), transparent 40%);
    color: #e8eaf0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }
  .hint {
    max-width: 420px;
    opacity: 0.55;
    font-size: 14px;
    line-height: 1.6;
  }
  .hint b { color: #7cc8ff; font-weight: 600; }
</style>
</head>
<body>
  <div class="hint">
    Mova o mouse pela tela para ver o cursor fluido.<br>
    Tente movimentos <b>rápidos</b> e <b>lentos</b> para sentir a diferença no rastro.
  </div>

  <script src="fluid-cursor.js" defer></script>
</body>
</html>
